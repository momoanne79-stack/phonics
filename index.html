const TYPES = DATA.types;

const $=(q,root=document)=>root.querySelector(q);

let currentTab='unit', currentUnit=0, mode='full', quizItems=[], qIndex=0, roundCorrect=0;

function getData(){try{return JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){return {}}}
function setData(data){localStorage.setItem(STORE,JSON.stringify(data))}
function unitState(id){const d=getData();return d[id]||{attempts:0,bestScore:0,lastScore:null,passed:false,wrongIds:[],history:[],progress:null}}
function saveUnitState(id,patch){const d=getData();d[id]={...unitState(id),...patch};setData(d)}
function nowStr(){return new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}
function shuffle(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
function tokens(s){return s.replace(/[“”]/g,'"').replace(/[‘’]/g,"'").split(/\s+/).filter(Boolean)}
function norm(s){return s.toLowerCase().replace(/[“”‘’'".,!?;:()\[\]]/g,'').replace(/[^a-z0-9]+/g,' ').trim()}
function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function markInf(en,inf){const safe=esc(en);const target=esc(inf);const idx=safe.toLowerCase().indexOf(target.toLowerCase());if(idx<0)return safe;return safe.slice(0,idx)+'<u>'+safe.slice(idx,idx+target.length)+'</u>'+safe.slice(idx+target.length)}
function itemId(ui,ii){return 'u'+ui+'-'+ii}
function itemIndexFromId(id){return Number(String(id).split('-')[1])}
function allWrongEntries(){const out=[];UNITS.forEach((u,ui)=>{const ids=unitState(u.id).wrongIds||[];ids.forEach(id=>{const ii=itemIndexFromId(id);if(u.items[ii])out.push({ui,id,item:u.items[ii]})})});return out}
function buildQuizItems(i,m,itemIds=null){const u=UNITS[i], st=unitState(u.id);let ids=[];if(Array.isArray(itemIds)&&itemIds.length)ids=itemIds;else if(m==='wrong')ids=[...(st.wrongIds||[])].sort((a,b)=>itemIndexFromId(a)-itemIndexFromId(b));else ids=u.items.map((_,idx)=>itemId(i,idx));return ids.map(id=>({item:u.items[itemIndexFromId(id)],id})).filter(x=>x.item)}
function progressText(p){if(!p||!p.active)return '';const done=Math.min(p.qIndex||0,p.total||0), total=p.total||0, correct=p.correct||0;const score=done?Math.round(correct/done*100):0;return `${p.mode==='wrong'?'오답':'전체'} 진행 중 · ${done}/${total}문장 · 현재 ${correct}/${done||0} (${score}점)`}
function saveProgress(nextIndex=qIndex, correct=roundCorrect){const u=UNITS[currentUnit]; if(!u||!quizItems.length)return;const st=unitState(u.id), old=st.progress||{};const progress={active:true,mode,qIndex:Math.max(0,Math.min(nextIndex,quizItems.length)),correct:Math.max(0,correct),total:quizItems.length,itemIds:quizItems.map(x=>x.id),startedAt:old.startedAt||nowStr(),updatedAt:nowStr()};saveUnitState(u.id,{progress})}

function initAudio(){try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}catch(e){}}
function tone(f,d=0.12,type='sine',vol=.08){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}

function burst(){const colors=['#f5a623','#22a06b','#1a5c9a','#e5534b'];for(let i=0;i<18;i++){const el=document.createElement('i');el.className='confetti';el.style.left=(50+(Math.random()*34-17))+'%';el.style.top=(35+(Math.random()*8-4))+'%';el.style.background=colors[i%colors.length];el.style.animationDelay=(Math.random()*0.12)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),1100)}}
function renderShell(){renderTabs();const sections=$('#sections');sections.innerHTML='';UNITS.forEach((u,i)=>{const sec=document.createElement('section');sec.id='section-unit-'+i;sec.className='section '+(currentTab==='unit'&&currentUnit===i?'active':'');sections.appendChild(sec);renderUnitHome(i)});const rec=document.createElement('section');rec.id='section-record';rec.className='section '+(currentTab==='record'?'active':'');sections.appendChild(rec);renderGlobalRecord();const wrong=document.createElement('section');wrong.id='section-wrong';wrong.className='section '+(currentTab==='wrong'?'active':'');sections.appendChild(wrong);renderGlobalWrong()}
function renderTabs(){const tabs=$('#tabs');tabs.innerHTML='';UNITS.forEach((u,i)=>{const st=unitState(u.id);const b=document.createElement('button');b.className='tab '+(currentTab==='unit'&&currentUnit===i?'active ':'')+(st.passed?'pass ':'');b.textContent=u.tab;b.onclick=()=>showUnit(i);tabs.appendChild(b)});const rb=document.createElement('button');rb.className='tab '+(currentTab==='record'?'active':'');rb.textContent='기록';rb.onclick=showRecord;tabs.appendChild(rb);const wb=document.createElement('button');wb.className='tab warn '+(currentTab==='wrong'?'active':'');wb.textContent='오답 '+allWrongEntries().length;wb.onclick=showWrong;tabs.appendChild(wb)}

function renderUnitHome(i){const u=UNITS[i],st=unitState(u.id),sec=$('#section-unit-'+i);const wrongCount=(st.wrongIds||[]).length;const p=st.progress;const inProgress=p&&p.active;const progressCard=inProgress?`<div class="card soft"><div class="record"><div><b>저장된 풀이</b><br><small>${progressText(p)}<br>마지막 저장: ${p.updatedAt||'-'}</small></div><strong>${Math.min(p.qIndex||0,p.total||0)}/${p.total||0}</strong></div><button class="btn orange" onclick="continueProgress(${i})">이어 풀기</button></div>`:'';sec.innerHTML=`<div class="card soft"><h2 class="unit-title">${u.title}</h2><div class="desc">${u.desc}</div><div class="top-tools"><span class="badge ${st.passed?'green':'gold'}">${st.passed?'통과 완료':'통과 대기'}</span><span class="badge">${u.items.length}문장</span><span class="badge red">오답 ${wrongCount}개</span></div><div class="progress"><div class="bar" style="width:${st.passed?100:Math.min(st.bestScore||0,100)}%"></div></div></div>${progressCard}<div class="card"><div class="btn-row"><button class="btn" onclick="startRound(${i},'full')">전체 문제 처음부터 풀기</button><button class="btn orange" onclick="startRound(${i},'wrong')" ${wrongCount?'':'disabled'}>오답 다시 풀기 (${wrongCount})</button></div><div class="meta-line"><span class="badge">최고 ${st.bestScore||0}점</span><span class="badge">시도 ${st.attempts||0}회</span><span class="badge">최근 ${st.lastScore==null?'-':st.lastScore+'점'}</span></div></div><div id="quiz-${i}" class="hidden"></div>`}
function startRound(i,m){currentTab='unit';currentUnit=i;mode=m;qIndex=0;roundCorrect=0;lockedWrite=false;lockedType=false;questionHadWrong=false;quizItems=buildQuizItems(i,m);if(m==='wrong'&&!quizItems.length){alert('남은 오답이 없습니다.');return}saveProgress(0,0);renderShell();$(`#quiz-${i}`).classList.remove('hidden');loadQuestion()}
function continueProgress(i){const u=UNITS[i], st=unitState(u.id), p=st.progress;if(!p||!p.active){startRound(i,'full');return}currentTab='unit';currentUnit=i;mode=p.mode||'full';quizItems=buildQuizItems(i,mode,p.itemIds);qIndex=Math.max(0,Math.min(p.qIndex||0,quizItems.length));roundCorrect=p.correct||0;lockedWrite=false;lockedType=false;questionHadWrong=false;renderShell();const box=$(`#quiz-${i}`);if(box)box.classList.remove('hidden');if(qIndex>=quizItems.length) finishRound(); else loadQuestion()}
function loadQuestion(){lockedWrite=false;lockedType=false;questionHadWrong=false;const i=currentUnit,q=quizItems[qIndex],box=$(`#quiz-${i}`),total=quizItems.length,answerTokens=tokens(q.item.en),shuffled=shuffle(answerTokens.map((t,idx)=>({t,idx})));saveProgress(qIndex,roundCorrect);box.innerHTML=`<div class="card quiz-head"><div class="status"><span class="badge">${mode==='wrong'?'오답':'전체'} ${qIndex+1} / ${total}</span><span class="badge">${q.item.sec}</span><span class="badge green">정답 ${roundCorrect}</span></div><div class="qno">뜻</div><div class="ko">${esc(q.item.ko)}</div><div class="hint">1단계: 아래 단어를 눌러 위 답안 영역으로 올리고, 순서를 맞추세요.</div></div><div class="area-title">답안</div><div id="answer" class="answer" aria-label="답안 영역"></div><div class="area-title">단어</div><div id="bank" class="bank" aria-label="단어 영역"></div><div id="feedback" class="feedback"></div><div id="type-card" class="type-card"></div>`;const bank=$('#bank');shuffled.forEach(obj=>{const chip=document.createElement('button');chip.type='button';chip.className='chip';chip.textContent=obj.t;chip.dataset.idx=obj.idx;chip.onclick=()=>moveChip(chip);bank.appendChild(chip)});setupSortable();setTimeout(()=>box.scrollIntoView({behavior:'smooth',block:'start'}),50)}
function setupSortable(){if(!window.Sortable)return;if(window._grammarSortAnswer){try{window._grammarSortAnswer.destroy();window._grammarSortBank.destroy()}catch(e){}}const opts={group:'grammarWords',animation:160,ghostClass:'sortable-ghost',dragClass:'sortable-drag',fallbackOnBody:true,swapThreshold:.65,onEnd:()=>setTimeout(autoCheckIfReady,60)};window._grammarSortAnswer=Sortable.create($('#answer'),opts);window._grammarSortBank=Sortable.create($('#bank'),opts)}

function checkWrittenAnswer(){if(lockedWrite)return;const q=quizItems[qIndex],ansTokens=$all('#answer .chip').map(c=>c.textContent),expectedTokens=tokens(q.item.en);if(ansTokens.length!==expectedTokens.length)return;const fb=$('#feedback'),ok=norm(ansTokens.join(' '))===norm(q.item.en);if(ok){lockedWrite=true;showOkFlash();burst();sfxOK();$('#answer').style.background='#e8fff4';$('#answer').style.borderColor='var(--green)';fb.className='feedback ok show';fb.innerHTML=`영작 OK! 이제 아래 문장의 to부정사 용법을 고르세요.<div class="eng-answer">${esc(q.item.en)}</div>`;renderTypeQuestion(q.item)}else{questionHadWrong=true;addWrong(q.id);sfxNG();$('#answer').style.background='#fff0f0';$('#answer').style.borderColor='var(--red)';fb.className='feedback ng show';fb.innerHTML='문장 순서가 달라요. 답안 영역에서 단어를 드래그해 순서를 고쳐보세요.'}}

function renderGlobalRecord(){const sec=$('#section-record');const rows=UNITS.map((u,i)=>{const st=unitState(u.id),wrong=(st.wrongIds||[]).length;return `<div class="record"><div><b>${u.tab}</b><br><small>${u.title}<br>시도 ${st.attempts||0}회 · 오답 ${wrong}개</small></div><strong>${st.passed?'PASS':(st.lastScore==null?'-':st.lastScore+'점')}</strong></div>`}).join('');const recent=UNITS.map(u=>({u,st:unitState(u.id)})).flatMap(({u,st})=>(st.history||[]).map(h=>({u,h}))).slice(0,8).map(({u,h})=>`<div class="record"><div><b>${u.tab} ${h.mode==='wrong'?'오답':'전체'}</b><br><small>${h.date} · ${h.correct}/${h.total} · 남은 오답 ${h.wrongLeft}</small></div><strong>${h.score}점</strong></div>`).join('');sec.innerHTML=`<div class="card soft"><h2 class="unit-title">학습 기록</h2><div class="desc">영작과 용법 선택을 모두 처음에 맞힌 경우만 정답으로 계산합니다.</div></div><div class="record-grid">${rows}</div><div class="card"><h2 class="unit-title">최근 기록</h2>${recent||'<div class="empty">아직 기록이 없습니다.</div>'}</div>`}
