<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>수리나무학원 동명사·분사 문장 언스크램블</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<style>
:root{--main:#1a5c9a;--main2:#0d365e;--accent:#f5a623;--bg:#f3f8ff;--soft:#eef7ff;--line:#d5e7f8;--text:#142133;--muted:#60758a;--green:#22a06b;--red:#e5534b;--shadow:0 12px 36px rgba(26,92,154,.16)}
*{box-sizing:border-box}
body{margin:0;padding:14px;background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif}
#app{max-width:560px;margin:0 auto;background:#fff;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);min-height:calc(100vh - 28px)}
.header{background:linear-gradient(135deg,var(--main),var(--main2));color:#fff;text-align:center;padding:24px 18px 17px;position:relative;overflow:hidden}
.header:before{content:'';position:absolute;right:-50px;top:-55px;width:145px;height:145px;border-radius:50%;background:rgba(255,255,255,.12)}
.header:after{content:'';position:absolute;left:-38px;bottom:-58px;width:120px;height:120px;border-radius:50%;background:rgba(245,166,35,.18)}
.label{display:inline-block;background:var(--accent);color:#432700;border-radius:999px;padding:5px 12px;font-weight:1000;font-size:12px;margin-bottom:8px;position:relative;z-index:1}
.header h1{font-size:22px;margin:4px 0 6px;letter-spacing:-.3px;position:relative;z-index:1}
.header p{margin:0;font-size:13px;font-weight:800;opacity:.92;line-height:1.5;position:relative;z-index:1}
.tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;background:#f7fbff;padding:10px;border-bottom:1px solid #e6eef8;position:sticky;top:0;z-index:10}
.tab{border:0;border-radius:13px;background:#e8f1fa;color:#24445f;min-height:50px;font-size:13px;font-weight:1000;cursor:pointer}
.tab.active{background:var(--main);color:#fff;box-shadow:0 4px 14px rgba(26,92,154,.25)}
.tab.pass::after{content:' ✓';color:inherit}
.tab.warn{background:#fff5e0;color:#7a5300}.tab.warn.active{background:var(--accent);color:#432700}
.section{display:none;padding:16px}.section.active{display:block;animation:fade .22s ease}@keyframes fade{from{opacity:.4;transform:translateY(5px)}to{opacity:1;transform:none}}
.card{border:1.7px solid var(--line);border-radius:18px;padding:15px;background:#fff;margin-bottom:13px}.soft{background:var(--soft)}
.unit-title{font-size:20px;color:var(--main);font-weight:1000;margin:0 0 7px}.desc{font-size:14px;color:var(--muted);font-weight:800;line-height:1.58}
.status{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:11px;flex-wrap:wrap}.badge{display:inline-block;background:#e8f1fa;color:#24445f;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:1000}
.badge.green{background:#e8fff4;color:#11623d}.badge.red{background:#fff0f0;color:#a2322e}.badge.gold{background:#fff8e8;color:#7a5300}
.progress{height:13px;border-radius:999px;background:#dbeefa;overflow:hidden;margin-top:10px}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--green));transition:.35s}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{width:100%;border:0;border-radius:14px;min-height:52px;padding:13px 10px;font-size:16px;font-weight:1000;cursor:pointer;background:var(--main);color:#fff;margin-top:8px}
.btn.secondary{background:#e8f1fa;color:#24445f}.btn.orange{background:var(--accent);color:#432700}.btn.danger{background:var(--red);color:#fff}.btn:active{transform:scale(.99)}.btn[disabled]{opacity:.42;cursor:not-allowed}
.quiz-head{background:#f8fbff;border:1.7px solid #e3edf8;border-radius:17px;padding:14px;margin-bottom:11px}.qno{font-size:14px;color:var(--main);font-weight:1000;margin-bottom:8px}
.ko{font-size:19px;line-height:1.6;font-weight:1000;color:#0e3758}.hint{font-size:13px;color:#6a7f93;font-weight:800;line-height:1.55;margin-top:9px}
.answer,.bank{display:flex;flex-wrap:wrap;gap:9px;align-items:center;justify-content:center;border-radius:17px;padding:13px;min-height:82px;margin-bottom:11px}
.answer{border:2px dashed var(--main);background:#eef7ff}.bank{border:2px solid #e7eff8;background:#f8fbff}
.area-title{font-size:13px;font-weight:1000;color:#60758a;margin:8px 0 6px;text-align:center}
.chip{border:2px solid #b8d6ef;background:white;border-radius:12px;padding:12px 15px;font-weight:1000;font-size:16px;cursor:pointer;touch-action:manipulation;user-select:none;line-height:1.24;box-shadow:0 2px 8px rgba(26,92,154,.07)}
.chip:active{transform:translateY(1px);background:#f2f9ff}.answer .chip{border-color:#7fb3df}.sortable-ghost{opacity:.35}.sortable-drag{background:var(--main)!important;color:#fff!important;box-shadow:0 8px 18px rgba(26,92,154,.25)!important}
.ok-pop{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);z-index:9999;background:#e8fff4;color:#11623d;border:2px solid var(--green);border-radius:999px;padding:10px 22px;font-size:25px;font-weight:1000;letter-spacing:.7px;box-shadow:0 10px 26px rgba(34,160,107,.24);pointer-events:none;animation:okFlash .85s ease-out forwards}@keyframes okFlash{0%{opacity:0;transform:translate(-50%,-35%) scale(.7)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-65%) scale(.92)}}
.feedback{display:none;border-radius:15px;padding:14px;margin-top:11px;font-weight:1000;line-height:1.58}.feedback.show{display:block}.feedback.ok{background:#e8fff4;border:2px solid var(--green);color:#11623d}.feedback.ng{background:#fff0f0;border:2px solid var(--red);color:#a2322e}
.eng-answer{font-family:Georgia,'Times New Roman',serif;font-size:16px;color:#142133;margin-top:7px;line-height:1.5}.complete{display:none;text-align:center}.complete.show{display:block}
.big-emoji{font-size:54px;line-height:1;margin:8px 0;animation:bounce .85s ease}@keyframes bounce{0%{transform:scale(.7)}45%{transform:scale(1.12)}100%{transform:scale(1)}}
.score-big{font-size:36px;font-weight:1000;color:var(--main);margin:10px 0}.record-grid{display:grid;gap:10px}
.record{display:flex;justify-content:space-between;gap:10px;align-items:center;background:#f8fbff;border:1.5px solid #e4eef8;border-radius:15px;padding:13px}.record b{color:var(--main)}.record small{color:var(--muted);font-weight:800}
.wrong-list{display:grid;gap:9px;margin-top:10px}.wrong-item{border-left:5px solid var(--red);background:#fff7f7;border-radius:13px;padding:11px 12px;font-weight:900;line-height:1.48}.wrong-item .en{display:none!important}.wrong-item .unit{color:var(--main);font-weight:1000;margin-bottom:3px}
.top-tools{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}.empty{background:#f8fbff;border:1.5px dashed #cbddeb;border-radius:14px;padding:15px;text-align:center;color:#60758a;font-weight:900;line-height:1.55}.hidden{display:none!important}.unit-list{display:grid;gap:12px}.meta-line{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.next-panel{text-align:center}.next-panel .ok-small{font-size:20px;color:#11623d;font-weight:1000;margin-bottom:4px}.try-msg{font-size:14px;color:#a2322e;font-weight:1000}
.confetti{position:fixed;width:8px;height:12px;z-index:9998;pointer-events:none;border-radius:3px;animation:fall .95s ease-out forwards}@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(145px) rotate(280deg);opacity:0}}

.check-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}.check-card{background:#fff;border:1.5px solid #d5e7f8;border-radius:16px;padding:13px}.check-card b{display:block;color:var(--main);font-size:15px;margin-bottom:6px}.check-card span{font-weight:1000;font-size:17px}.name-row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:10px}.name-input{width:100%;border:2px solid #d5e7f8;border-radius:13px;padding:13px;font-size:16px;font-weight:900}.copy-box{background:#f8fbff;border:1.5px dashed #b8d6ef;border-radius:13px;padding:10px;margin-top:9px;font-size:12px;font-weight:900;color:#24445f;line-height:1.55;word-break:break-all}.summary-top{display:grid;grid-template-columns:1.15fr .85fr;gap:10px;margin-top:10px}.summary-hero{background:linear-gradient(135deg,#eef7ff,#fff9ea);border:1.5px solid #d8e7f6;border-radius:18px;padding:15px}.summary-hero .hero-big{font-size:28px;font-weight:1000;color:var(--main);margin:4px 0}.summary-hero .hero-sub{font-size:13px;color:#5f748a;font-weight:900;line-height:1.5}.summary-box{background:#fff;border:1.5px solid #d5e7f8;border-radius:18px;padding:14px;display:flex;flex-direction:column;justify-content:center}.summary-box .big{font-size:30px;font-weight:1000;color:#22a06b}.summary-box .sub{font-size:13px;color:#60758a;font-weight:900;line-height:1.5}.summary-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.pet-card{background:linear-gradient(135deg,#f8fbff,#fffdf5);border:1.6px solid #d9e8f7;border-radius:18px;padding:14px;margin-bottom:11px;text-align:center}.pet-emoji{font-size:54px;line-height:1;margin-bottom:6px;animation:bounce .85s ease}.pet-name{font-size:18px;font-weight:1000;color:var(--main)}.pet-sub{font-size:13px;color:#60758a;font-weight:900;line-height:1.45;margin-top:4px}.pet-progress{height:13px;border-radius:999px;background:#dbeefa;overflow:hidden;margin-top:10px}.pet-fill{height:100%;background:linear-gradient(90deg,#f5a623,#22a06b);border-radius:999px;transition:.35s}.pet-stage-row{display:flex;justify-content:space-between;gap:6px;margin-top:8px;font-size:11px;color:#60758a;font-weight:1000}.auto-next-msg{font-size:14px;color:#11623d;font-weight:1000;line-height:1.5}.reward-line{font-size:13px;color:#7a5300;font-weight:1000;margin-top:4px}.micro-note{font-size:12px;color:#60758a;font-weight:900;line-height:1.45;margin-top:6px}@media(max-width:520px){.summary-top{grid-template-columns:1fr}.summary-actions{grid-template-columns:1fr}.check-grid{grid-template-columns:1fr}.name-row{grid-template-columns:1fr}.tabs{grid-template-columns:repeat(2,1fr)}}

@media(max-width:520px){.tabs{grid-template-columns:repeat(2,1fr)}body{padding:10px}.header h1{font-size:20px}.section{padding:13px}.btn-row{grid-template-columns:1fr}.chip{font-size:15px;padding:11px 13px}.tab{font-size:12px;min-height:46px}.ko{font-size:18px}.answer,.bank{min-height:76px}}
</style>
</head>
<body>
<div id="app">
  <div class="header"><span class="label">수리나무학원 Grammar Worksheet</span><h1>동명사·분사 문장 언스크램블</h1><p>Unit 11~14 전체 71문장 · 해석을 보고 단어를 배열해 문장을 완성하세요.<br>정답이면 자동으로 다음 문제로 넘어가고, 알이 병아리로 성장합니다.</p></div>
  <div class="tabs" id="tabs"></div>
  <div id="sections"></div>
</div>
<script>
const UNITS = [{"id": "unit11", "tab": "Unit 11", "title": "Unit 11 동명사", "desc": "동명사의 주어·목적어·보어 역할과 관용 표현을 문장 배열로 연습합니다.", "items": [{"sec": "A-1", "ko": "외국 동전을 모으는 것은 나의 취미이다.", "en": "Collecting foreign coins is my hobby."}, {"sec": "A-2", "ko": "나를 이해하려고 노력해 줘서 고마워.", "en": "Thank you for trying to understand me."}, {"sec": "A-3", "ko": "내 직업은 사람들에게 요리하는 법을 가르치는 것이다.", "en": "My job is teaching people how to cook."}, {"sec": "A-4", "ko": "그의 계획은 일주일에 세 번 수영하는 것이다.", "en": "His plan is swimming three times a week."}, {"sec": "A-5", "ko": "너는 역사 수업을 복습하는 것을 끝냈니?", "en": "Did you finish reviewing your history lessons?"}, {"sec": "B-1", "ko": "그의 생각은 고려할 가치가 없다.", "en": "His idea is not worth considering."}, {"sec": "B-2", "ko": "그녀는 시험을 치르는 것에 대해 걱정하고 있다.", "en": "She is worried about taking the test."}, {"sec": "B-3", "ko": "나는 중간고사를 공부하느라 바쁘다.", "en": "I'm busy studying for the midterm exam."}, {"sec": "B-4", "ko": "내 목표는 내 아이들의 롤모델이 되는 것이다.", "en": "My goal is to be a role model for my children."}, {"sec": "B-5", "ko": "나는 네 만화를 곧 보기를 고대하고 있다.", "en": "I'm looking forward to seeing your cartoons soon."}, {"sec": "C-1", "ko": "좋은 친구가 되는 것은 쉽지 않다.", "en": "Being a good friend is not easy."}, {"sec": "C-2", "ko": "정부의 의무는 사람들을 보호하는 것이다.", "en": "The government's duty is protecting people."}, {"sec": "C-3", "ko": "나는 그 영화를 본 후 울고 싶었다.", "en": "I felt like crying after watching that movie."}, {"sec": "C-4", "ko": "그는 자신의 감정을 표현하는 데 서투르다.", "en": "He's not good at expressing his emotions."}, {"sec": "D-1", "ko": "Kate의 꿈은 영화감독이 되는 것이다.", "en": "Kate's dream is becoming a movie director."}, {"sec": "D-2", "ko": "Amy는 친구들에게 작별 인사를 하지 않고 교실을 떠났다.", "en": "Amy left the classroom without saying goodbye to her friends."}, {"sec": "D-3", "ko": "초콜릿을 너무 많이 먹는 것은 아이들의 치아에 좋지 않다.", "en": "Eating too much chocolate is not good for children's teeth."}]}, {"id": "unit12", "tab": "Unit 12", "title": "Unit 12 동명사와 to부정사", "desc": "동명사만 목적어로 쓰는 동사, to부정사를 목적어로 쓰는 동사, 의미 차이를 연습합니다." ": "Kate는 발레 레슨을 들어보았지만, 그녀는 그것을 좋아하지 않았다.", "en": "Kate tried taking ballet lessons, but she didn't like it."}, {"sec": "D-4", "ko": "나는 그녀에게 이메일을 보냈던 것을 잊어버려서 이메일을 또 보냈다.", "en": "I forgot emailing her, so I sent her another one."}]}, {"id": "unit13", "tab": "Unit 13", "title": "Unit 13 분사", "desc": "현재분사와 과거분사의 명사 수식, 감정 형용사, 목적격보어 쓰임을 연습합니다.", "items": [{"sec": "A-1", "ko": "노래를 부르고 있는 여자는 누구니?", "en": "Who is the woman singing a song?"}, {"sec": "A-2", "ko": "번지점프는 매우 신난다.", "en": "Bungee jumping is very exciting."}, {"sec": "A-3", "ko": "그녀는 자신의 성적에 만족했다.", "en": "She was pleased with her grades."}, {"sec": "A-4", "ko": "Roald Dahl에 의해 쓰인 책들은 놀랍다.", "en": "The books written by Roald Dahl are amazing."}, {"sec": "A-5", "ko": "공원에 상처 입은 개가 있다.", "en": "There is a wounded dog in the park."}, {"sec": "B-1", "ko": "우리는 그의 반응에 놀랐다.", "en": "We were surprised at his reaction."}, {"sec": "B-2", "ko": "물에 빠진 사람은 지푸라기라도 잡는다.", "en": "A drowning man will catch at a straw."}, {"sec": "B-3", "ko": "오늘의 축구 경기는 매우 실망스러웠다.", "en": "Today's soccer game was very disappointing."}, {"sec": "B-4", "ko": "Roy는 자신의 고장 난 자전거를 혼자 수리했다.", "en": "Roy repaired his broken bicycle by himself."}, {"sec": "B-5", "ko": "저 지루한 영화를 보지 마. 그것은 지난주에 나를 지루하게 했다.", "en": "Don't watch that boring movie. It bored me last week."}, {"sec": "C-1", "ko": "너는 노래를 쓰는 데 관심이 있니?", "en": "Are you interested in writing a song?"}, {"sec": "C-2", "ko": "나는 영화가 상영되는 동안 Kelly가 자는 것을 보았다.", "en": "I saw Kelly sleeping during the movie."}, {"sec": "C-3", "ko": "그녀는 너무 충격을 받아서 자신의 책을 떨어뜨렸다.", "en": "She was so shocked that she dropped her book."}, {"sec": "C-4", "ko": "Kate는 독일에서 만들어진 카메라를 샀다.", "en": "Kate bought a camera made in Germany."}, {"sec": "D-1", "ko": "너는 첼로를 연주하고 있는 소녀를 아니?", "en": "Do you know the girl playing the cello?"}, {"sec": "D-2", "ko": "나는 저기 야구 모자를 쓰고 있는 남자를 좋아한다.", "en": "I like the man wearing a baseball cap over there."}, {"sec": "D-3", "ko": "그 지루한 강의는 우리를 잠들게 했다.", "en": "The boring lectur function setupSortable(){if(!window.Sortable)return;if(window._grammarSortAnswer){try{window._grammarSortAnswer.destroy();window._grammarSortBank.destroy()}catch(e){}}const opts={group:'grammarWords',animation:160,ghostClass:'sortable-ghost',dragClass:'sortable-drag',fallbackOnBody:true,swapThreshold:.65,onEnd:()=>setTimeout(autoCheckIfReady,60)};window._grammarSortAnswer=Sortable.create($('#answer'),opts);window._grammarSortBank=Sortable.create($('#bank'),opts)}
function showOkFlash(){const old=$('.ok-pop');if(old)old.remove();const el=document.createElement('div');el.className='ok-pop';el.textContent='OK';document.body.appendChild(el);setTimeout(()=>el.remove(),900)}
function moveChip(chip){if(locked)return;initAudio();const ans=$('#answer'),bank=$('#bank');if(chip.parentElement===bank)ans.appendChild(chip);else bank.appendChild(chip);setTimeout(autoCheckIfReady,50)}
function autoCheckIfReady(){if(locked)return;const bank=$('#bank');if(!bank||bank.children.length!==0)return;checkAutoAnswer()}
function checkAutoAnswer(){
  if(locked)return;const q=quizItems[qIndex],ansTokens=$all('#answer .chip').map(c=>c.textContent),expectedTokens=tokens(q.item.en);if(ansTokens.length!==expectedTokens.length)return;const fb=$('#feedback'),key=norm(ansTokens.join(' '));const ok=key===norm(q.item.en);
  if(ok){
    locked=true;const firstTry=!questionHadWrong;if(firstTry)roundCorrect++;if(mode==='wrong'&&firstTry){removeWrong(q.id)}else{renderTabs()}showOkFlash();burst();sfxOK();$('#answer').style.background='#e8fff4';$('#answer').style.borderColor='var(--green)';saveProgress(qIndex+1,roundCorrect,{questionHadWrong:false});
    const retryNote=(!firstTry)?'<div class="reward-line">이번 화면에서는 맞혔지만, 처음에 틀린 문제라 오답체크에 남습니다.</div>':(mode==='wrong'?'<div class="reward-line">오답 다시 풀기에서 정답 처리되어 오답목록에서 삭제됩니다.</div>':'<div class="reward-line">정답! 다음 문제로 자동 이동합니다.</div>');
    fb.className='feedback ok show';fb.innerHTML=`<div class="next-panel"><div class="ok-small">🎉 정답!</div><div class="auto-next-msg">효과음과 폭죽 보상 후 자동으로 다음 문제로 넘어갑니다.</div>${retryNote}</div>`;
    setTimeout(()=>{if(locked)nextQuestion()},1250);
  }
  else{questionHadWrong=true;addWrong(q.id);sfxNG();saveProgress(qIndex,roundCorrect,{questionHadWrong:true});$('#answer').style.background='#fff0f0';$('#answer').style.borderColor='var(--red)';if(lastWrongKey!==key){fb.className='feedback ng show';fb.innerHTML='<div class="try-msg">순서가 아직 맞지 않습니다. 단어를 다시 드래그해서 배열해 보세요.</div><div class="micro-note">이 문제는 오답체크에 저장됩니다. 지금 다시 맞히면 현재 문제는 통과되지만 오답 다시 풀기에서 한 번 더 확인해야 합니다.</div>';lastWrongKey=key}setTimeout(()=>{if(!locked){$('#answer').style.background='#eef7ff';$('#answer').style.borderColor='var(--main)'}},550)}
}
function addWrong(id){const u=UNITS[currentUnit],st=unitState(u.id),arr=st.wrongIds||[];if(!arr.includes(id))arr.push(id);saveUnitState(u.id,{wrongIds:arr,passed:false});renderTabs()}
function removeWrong(id){const u=UNITS[currentUnit],st=unitState(u.id),arr=(st.wrongIds||[]).filter(x=>x!==id);saveUnitState(u.id,{wrongIds:arr});renderTabs()}
function nextQuestion(){qIndex++;if(qIndex<quizItems.length){saveProgress(qIndex,roundCorrect,{questionHadWrong:false});loadQuestion()}else finishRound()}
function finishRound(){
  const i=currentUnit,u=UNITS[i],st=unitState(u.id),total=quizItems.length,score=Math.round(roundCorrect/total*100);let wrongLeft=(unitState(u.id).wrongIds||[]).length;
  let passed=wrongLeft===0; const history=[{time:nowStr(),mode,correct:roundCorrect,total,score,passed},...(st.history||[])].slice(0,30);const best=mode==='full'?Math.max(st.bestScore||0,score):(st.bestScore||0);
  saveUnitState(u.id,{attempts:(st.attempts||0)+1,lastScore:score,bestScore:best,history,passed,progress:null});wrongLeft=(unitState(u.id).wrongIds||[]).length;const box=$(`#quiz-${i}`),emoji=passed?'🏆':'📝';if(passed)burst();
  box.innerHTML=`<div class="card complete show"><div class="big-emoji">${emoji}</div><h2 class="unit-title">${passed?'통과 완료!':'오답을 마무리해요'}</h2><div class="score-big">${roundCorrect}/${total}</div><div class="desc">${passed?'기록에서 PASS로 표시됩니다.':'남은 오답을 오답 다시 풀기에서 첫 시도 정답으로 마무리하면 PASS로 바뀝니다.'}<br>남은 오답: ${wrongLeft}개</div><div class="btn-row"><button class="btn" onclick="startRound(${i},'full')">전체 다시 풀기</button><button class="btn orange" onclick="startRound(${i},'wrong')" ${wrongLeft?'':'disabled'}>오답 다시 풀기</button></div><button class="btn secondary" onclick="showRecord()">기록 보기</button></div>`;renderTabs()
}

function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function getStudentName(){const d=getData();return d._studentName||''}
function setStudentName(v){const d=getData();d._studentName=String(v||'').trim();setData(d);renderShell()}
function unitCheckStatus(ui){const u=UNITS[ui], st=unitState(u.id), p=st.progress, wrong=(st.wrongIds||[]).length;if(st.passed)return 'PASS';if(p&&p.active)return '진행 '+Math.min(p.qIndex||0,p.total||0)+'/'+(p.total||u.items.length);if(wrong>0)return '오답 '+wrong+'개';if(st.attempts>0)return '재시험 필요';return '미시작'}
function passCount(){return UNITS.filter(u=>unitState(u.id).passed).length}
function buildCheckCode(){const name=getStudentName()||'이름없음';const parts=UNITS.map((u,i)=>u.tab+':'+unitCheckStatus(i));const total=passCount()+'/'+UNITS.length+' PASS';return name+' | 동명사·분사 | '+parts.join(' | ')+' | 전체 '+total+' | '+nowStr()}
function copyCheckCode(){const code=buildCheckCode();if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(code).then(()=>alert('검사 코드가 복사되었습니다.')).catch(()=>prompt('검사 코드를 복사하세요.',code));}else{prompt('검사 코드를 복사하세요.',code)}}
function teacherSummaryHtml(){const name=esc(getStudentName());const totalPass=passCount();const rows=UNITS.map((u,i)=>{const st=unitState(u.id), status=unitCheckStatus(i), wrong=(st.wrongIds||[]).length, p=st.progress;const cls=status==='PASS'?'green':(status.startsWith('오답')?'red':'gold');const sub=st.passed?'오답 없음 · 검사 완료':(p&&p.active?`진행 ${Math.min(p.qIndex||0,p.total||0)}/${p.total||u.items.length}`:(wrong>0?`오답 ${wrong}개 남음`:'아직 검사 전'));return `<div class="check-card"><b>${u.tab} · ${u.title}</b><span class="badge ${cls}">${status}</span><div class="micro-note">${sub}</div><div class="summary-actions"><button class="btn" style="margin-top:0" onclick="showUnit(${i});startRound(${i},'full')">전체 풀기</button><button class="btn orange" style="margin-top:0" onclick="showUnit(${i});${wrong?`startRound(${i},'wrong')`:`alert('남은 오답이 없습니다.')`}">오답 확인</button></div></div>`}).join('');return `<div class="card soft"><h2 class="unit-title">✅ 선생님 검사 요약</h2><div class="desc">기록은 선생님이 한눈에 보기 쉽게 PASS / 오답 개수 / 진행 상황만 남기도록 단순화했습니다.</div><div class="name-row"><input class="name-input" value="${name}" placeholder="학생 이름 입력" onchange="setStudentName(this.value)"><button class="btn orange" style="margin-top:0" onclick="copyCheckCode()">검사코드 복사</button></div><div class="summary-top"><div class="summary-hero"><div class="hero-big">${getStudentName()||'학생 이름 입력'}</div><div class="hero-sub">교사 확인용 요약 화면입니다. 학생은 이 화면만 보여주면 되고, 선생님은 각 유닛의 PASS 여부와 남은 오답만 확인하면 됩니다.</div><div class="copy-box">${esc(buildCheckCode())}</div></div><div class="summary-box"><div class="big">${totalPass}/${UNITS.length}</div><div class="sub">전체 PASS 현황<br>오답이 모두 없어지면 PASS 처리됩니다.</div></div></div><div class="check-grid">${rows}</div><div class="summary-actions"><button class="btn secondary" style="margin-top:0" onclick="showWrong()">오답 목록 보기</button><button class="btn danger" style="margin-top:0" onclick="clearAllRecords()">기록 초기화</button></div></div>`}

function renderGlobalRecord(){
  const sec=$('#section-record');
  sec.innerHTML=teacherSummaryHtml();
}
function renderGlobalWrong(){const sec=$('#section-wrong'),entries=allWrongEntries();let html=`<div class="card soft"><h2 class="unit-title">📝 오답 다시 풀기</h2><div class="desc">틀린 문제는 여기에 남습니다. 답은 보이지 않고 해석만 보고 다시 배열합니다. 오답 다시 풀기에서 처음부터 맞히면 목록에서 삭제되고, 모두 없어지면 PASS 처리됩니다.</div></div>`;if(!entries.length){html+='<div class="empty">남은 오답이 없습니다.</div>';sec.innerHTML=html;return}const grouped={};entries.forEach(e=>{(grouped[e.ui]||(grouped[e.ui]=[])).push(e)});Object.keys(grouped).forEach(key=>{const ui=Number(key),u=UNITS[ui];grouped[key].sort((a,b)=>itemIndexFromId(a.id)-itemIndexFromId(b.id));html+=`<div class="card"><div class="status"><h3 class="unit-title" style="margin:0">${u.tab}</h3><span class="badge red">${grouped[key].length}개</span></div><div class="wrong-list">${grouped[key].map(e=>`<div class="wrong-item"><div class="unit">${e.item.sec}</div><div>${e.item.ko}</div><div class="hint" style="margin-top:6px">정답은 숨김 · 오답 풀기에서 다시 배열</div></div>`).join('')}</div><button class="btn orange" onclick="showUnit(${ui});startRound(${ui},'wrong')">${u.tab} 오답 풀기</button></div>`});sec.innerHTML=html}
function clearAllRecords(){if(!confirm('전체 기록, 오답, 이름을 모두 초기화할까요?'))return;MEMORY_DATA={};try{localStorage.removeItem(STORE)}catch(e){}renderShell()}
renderShell();
</script>
</body>
</html>
