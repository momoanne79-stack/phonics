<style>

*{box-sizing:border-box}body{margin:0;padding:14px;background:var(--bg);color:var(--text);font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif}#app{max-width:560px;margin:0 auto;background:#fff;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);min-height:calc(100vh - 28px)}

.feedback{display:none;border-radius:15px;padding:14px;margin-top:11px;font-weight:1000;line-height:1.58}.feedback.show{display:block}.feedback.ok{background:#e8fff4;border:2px solid var(--green);color:#11623d}.feedback.ng{background:#fff0f0;border:2px solid var(--red);color:#a2322e}.eng-answer{font-family:Georgia,'Times New Roman',serif;font-size:16px;color:#142133;margin-top:7px;line-height:1.5}.complete{display:none;text-align:center}.complete.show{display:block}.big-emoji{font-size:54px;line-height:1;margin:8px 0}.score-big{font-size:36px;font-weight:1000;color:var(--main);margin:10px 0}.record-grid{display:grid;gap:10px}.record{display:flex;justify-content:space-between;gap:10px;align-items:center;background:#f8fbff;border:1.5px solid #e4eef8;border-radius:15px;padding:13px}.record b{color:var(--main)}.record small{color:var(--muted);font-weight:800}.wrong-list{display:grid;gap:9px;margin-top:10px}.wrong-item{border-left:5px solid var(--red);background:#fff7f7;border-radius:13px;padding:11px 12px;font-weight:900;line-height:1.48}.wrong-item .en{font-family:Georgia,'Times New Roman',serif;color:#9c2d28;margin-top:4px}.wrong-item .unit{color:var(--main);font-weight:1000;margin-bottom:3px}.top-tools{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}.empty{background:#f8fbff;border:1.5px dashed #cbddeb;border-radius:14px;padding:15px;text-align:center;color:#60758a;font-weight:900;line-height:1.55}.hidden{display:none!important}.unit-list{display:grid;gap:12px}.meta-line{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}

  <div class="header"><span class="label">수리나무학원 Grammar Worksheet</span><h1>문법 문장 언스크램블</h1><p>Unit 1~4 전체 54문장 · 한글 해석을 보고 영어 문장을 완성하세요.<br>문제는 자료 순서대로 나오고, 각 Unit 전체 문제를 100점 맞아야 통과됩니다.</p></div>

<script>
const UNITS = [{"id":"unit1","tab":"Unit 1","title":"Unit 01 감각동사 + 형용사","desc":"감각동사 뒤에는 부사보다 형용사가 옵니다.","items":[{"sec":"A-1","ko":"이 생선은 맛이 좋아. 좀 먹어 봐.","en":"This fish tastes great. Try some."},{"sec":"A-2","ko":"오늘 아침 너는 신이 난 것처럼 들렸어.","en":"This morning, you sounded excited."},{"sec":"A-3","ko":"모든 것이 좋고 맛있는 냄새가 난다.","en":"Everything smells good and delicious."},{"sec":"A-4","ko":"그녀는 자신의 실수에 대해 미안해 보이지 않았다.","en":"She didn't look sorry for her mistake."},{"sec":"A-5","ko":"오늘은 따뜻하게 느껴진다. 봄 같다.","en":"It feels warm today. It feels like spring."},{"sec":"B-1","ko":"이 우유는 이상한 냄새가 나. 상한 것 같아.","en":"The milk smells strange. I think it's bad."},{"sec":"B-2","ko":"우리 할머니께서 병원에 계셔. 나는 슬퍼.","en":"My grandma is sick in hospital. I feel sad."},{"sec":"B-3","ko":"저 검은 말을 봐! 아름다워 보이지 않니?","en":"Look at that black horse! Doesn't it look beautiful?"},{"sec":"C-1","ko":"그 멜론은 달콤한 맛이 나니?","en":"Does the melon taste sweet?"},{"sec":"C-2","ko":"그는 자기 자신이 자랑스럽게 느껴졌다.","en":"He felt proud of himself."},{"sec":"C-3","ko":"그 이야기는 재미있게 들린다.","en":"The story sounds interesting."},{"sec":"C-4","ko":"그 교복은 너에게 아주 잘 어울려.","en":"The school uniform looks great on you."},{"sec":"D-1","ko":"우리 선생님은 목소리가 화난 것 같다.","en":"My teacher sounds angry."},{"sec":"D-2","ko":"그녀는 다정해 보이니?","en":"Does she look friendly?"},{"sec":"D-3","ko":"그 치킨 샐러드는 맛있어 보였지만, 맛은 형편없었다.","en":"The chicken salad looked delicious, but tasted terrible."}],"count":15},{"id":"unit2","tab":"Unit 2","title":"Unit 02 수여동사 + 간접목적어 + 직접목적어","desc":"수여동사는 ‘누구에게 + 무엇을’ 구조를 연습합니다.","items":[{"sec":"A-1","ko":"너에게 부탁 하나 해도 될까?","en":"May I ask you a favor?"},{"sec":"A-2","ko":"우리 부모님은 그것을 나에게 보여 주지 않으셨다.","en":"My parents didn't show it to me."},{"sec":"A-3","ko":"그는 그녀에게 자신의 전화번호를 주었다.","en":"He gave his phone number to her."},{"sec":"A-4","ko":"엄마, 저에게 간식 하나 가져다주실 수 있나요?","en":"Mom, could you bring me a snack?"},{"sec":"A-5","ko":"그녀는 나에게 초콜릿 케이크를 만들어 주었다.","en":"She made me a chocolate cake."},{"sec":"B-1","ko":"Elena는 그에게 몇 가지 질문을 했다.","en":"Elena asked some questions of him."},{"sec":"B-2","ko":"그 디자이너는 그녀에게 파란 드레스를 만들어 주었다.","en":"The designer made a blue dress for her."},{"sec":"B-3","ko":"나는 선생님께 감사 카드를 썼다.","en":"I wrote a thank-you card to my teacher."},{"sec":"C-1","ko":"우리 아빠가 우리에게 저녁을 요리해 주셨다.","en":"My dad cooked us dinner."},{"sec":"C-2","ko":"나는 그에게 도서관에 가는 길을 알려 주었다.","en":"I showed him the way to the library."},{"sec":"C-3","ko":"저에게 조언 좀 해 주시겠어요?","en":"Would you give me some advice?"},{"sec":"D-1","ko":"저에게 커피 한 잔만 가져다주시겠어요?","en":"Will you get me a cup of coffee?"},{"sec":"D-2","ko":"Ryan은 그녀에게 그의 사전을 빌려 주었다.","en":"Ryan lent his dictionary to her."},{"sec":"D-3","ko":"Jason이 나에게 자전거를 타는 법을 가르쳐 주었다.","en":"Jason taught me how to ride a bicycle."}],"count":14},{"id":"unit3","tab":"Unit 3","title":"Unit 03 동사 + 목적어 + 목적격보어","desc":"목적어 뒤에 목적격보어가 와서 ‘목적어가 ~하게/라고’의 뜻을 만듭니다.","items":[{"sec":"A-1","ko":"나는 그것이 지루하다고 생각했다.","en":"I found it boring."},{"sec":"A-2","ko":"알겠어. 나는 그것을 비밀로 할게.","en":"Sure. I'll keep it secret."},{"sec":"A-3","ko":"우리는 우리 밴드의 이름을 Black Day라고 지었다.","en":"We named our band Black Day."},{"sec":"B-1","ko":"아빠는 내 여동생에게 일찍 집에 오라고 말했다.","en":"Dad told my sister to come home early."},{"sec":"B-2","ko":"나는 네가 약속을 지키기를 기대한다.","en":"I expect you to keep your promise."},{"sec":"B-3","ko":"우리 선생님은 우리에게 다른 사람들의 말을 잘 들으라고 조언하셨다.","en":"My teacher advised us to listen to others well."},{"sec":"C-1","ko":"그의 무례함이 나를 화나게 만들었다.","en":"His rudeness made me angry."},{"sec":"C-2","ko":"그녀의 구명조끼가 그녀를 살아 있게 했다.","en":"Her life vest kept her alive."},{"sec":"C-3","ko":"엄마는 내가 밖에 나가 노는 것을 허락하지 않으셨다.","en":"My mom didn't allow me to play outside."},{"sec":"D-1","ko":"창문을 계속 열어 둬라.","en":"Keep the window open."},{"sec":"D-2","ko":"나는 그 남자가 이상하다는 것을 알았어.","en":"I found the man strange."},{"sec":"D-3","ko":"우리를 Dumb and Dumber라고 부르지 마세요.","en":"Don't call us Dumb and Dumber."}],"count":12},{"id":"unit4","tab":"Unit 4","title":"Unit 04 사역동사 / 지각동사 + 목적어 + 목적격보어","desc":"make, have, let, help, see, hear 등 뒤의 목적격보어 형태를 연습합니다.","items":[{"sec":"A-1","ko":"그녀는 내가 Emma에게 먼저 미안하다고 말하게 했다.","en":"She got me to say sorry to Emma first."},{"sec":"A-2","ko":"나는 어둠 속에서 그 작은 고양이가 우는 소리를 들었다.","en":"I heard the little cat cry in the dark."},{"sec":"A-3","ko":"너는 무대에서 그 소녀가 노래하는 것을 보았니?","en":"Did you see the girl sing on the stage?"},{"sec":"A-4","ko":"Jenny는 내가 과학 숙제를 하는 것을 도와주었다.","en":"Jenny helped me do my science homework."},{"sec":"B-1","ko":"나는 아빠가 저녁을 요리하는 것을 도왔다.","en":"I helped my dad cook dinner."},{"sec":"B-2","ko":"Mr. Firth는 그의 아들이 야구하는 것을 보았다.","en":"Mr. Firth saw his son play baseball."},{"sec":"B-3","ko":"엄마는 내가 건강을 위해 채소를 먹게 했다.","en":"Mom got me to eat vegetables for my health."},{"sec":"C-1","ko":"누가 Amy를 울렸니?","en":"Who made Amy cry?"},{"sec":"C-2","ko":"그녀는 그에게 그녀의 개를 산책시키게 했다.","en":"She had him walk her dog."},{"sec":"C-3","ko":"부모님은 내가 외출하는 것을 허락하지 않으셨다.","en":"My parents didn't let me go out."},{"sec":"D-1","ko":"나는 그의 목소리가 떨리고 있는 것을 들었다.","en":"I heard his voice trembling."},{"sec":"D-2","ko":"그는 내가 휴대전화를 찾도록 도와주었다.","en":"He helped me to find my cell phone."},{"sec":"D-3","ko":"그녀는 아들에게 심부름하도록 시켰다.","en":"She had her son run an errand."}],"count":13}];
const STORE='surinamu_grammar_units_1_4_seq_v3';
const $=(q,root=document)=>root.querySelector(q);
const $all=(q,root=document)=>Array.from(root.querySelectorAll(q));
let currentTab='unit', currentUnit=0, mode='full', quizItems=[], qIndex=0, roundCorrect=0, locked=false, questionHadWrong=false, lastWrongKey='', pendingQuestionHadWrong=false, audioCtx=null;
function getData(){try{return JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){return {}}}
function setData(data){localStorage.setItem(STORE,JSON.stringify(data))}
function unitState(id){const d=getData();return d[id]||{attempts:0,bestScore:0,lastScore:null,passed:false,wrongIds:[],history:[]}}
function saveUnitState(id,patch){const d=getData();d[id]={...unitState(id),...patch};setData(d)}
function nowStr(){return new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}
function shuffle(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
function tokens(s){return s.replace(/[“”]/g,'"').replace(/[‘’]/g,"'").split(/\s+/).filter(Boolean)}
function norm(s){return s.toLowerCase().replace(/[“”‘’'".,!?;:()\[\]]/g,'').replace(/[^a-z0-9]+/g,' ').trim()}
function itemId(ui,ii){return 'u'+ui+'-'+ii}
function itemIndexFromId(id){return Number(String(id).split('-')[1])}
function totalItems(){return UNITS.reduce((a,u)=>a+u.items.length,0)}
function allWrongEntries(){const out=[];UNITS.forEach((u,ui)=>{const ids=unitState(u.id).wrongIds||[];ids.forEach(id=>{const ii=itemIndexFromId(id);if(u.items[ii])out.push({ui,id,item:u.items[ii]})})});return out}

function buildQuizItems(i,m,itemIds=null){
  const u=UNITS[i], st=unitState(u.id);
  let ids=[];
  if(Array.isArray(itemIds) && itemIds.length){
    ids=itemIds;
  }else if(m==='wrong'){
    ids=[...(st.wrongIds||[])].sort((a,b)=>itemIndexFromId(a)-itemIndexFromId(b));
  }else{
    ids=u.items.map((_,idx)=>itemId(i,idx));
  }
  const items=ids.map(id=>({item:u.items[itemIndexFromId(id)],id})).filter(x=>x.item);
  if(!items.length && m==='full') return u.items.map((item,idx)=>({item,id:itemId(i,idx)}));
  return items;
}
function progressText(p){
  if(!p||!p.active)return '';
  const done=Math.min(p.qIndex||0,p.total||0), total=p.total||0, correct=p.correct||0;
  const score=done?Math.round(correct/done*100):0;
  return `${p.mode==='wrong'?'오답':'전체'} 진행 중 · ${done}/${total}문장 · 현재 ${correct}/${done||0} (${score}점)`;
}
function saveProgress(nextIndex=qIndex, correct=roundCorrect, extra={}){
  const u=UNITS[currentUnit]; if(!u||!quizItems.length)return;
  const st=unitState(u.id), old=st.progress||{};
  const progress={
    active:true,
    mode,
    qIndex:Math.max(0,Math.min(nextIndex,quizItems.length)),
    correct:Math.max(0,correct),
    total:quizItems.length,
    itemIds:quizItems.map(x=>x.id),
    questionHadWrong:!!questionHadWrong,
    startedAt:old.startedAt||nowStr(),
    updatedAt:nowStr(),
    ...extra
  };
  saveUnitState(u.id,{progress});
}
function clearProgress(i=currentUnit){
  const u=UNITS[i]; if(!u)return;
  saveUnitState(u.id,{progress:null});
}
function continueProgress(i){
  const u=UNITS[i], st=unitState(u.id), p=st.progress;
  if(!p||!p.active){startRound(i,'full');return;}
  currentTab='unit'; currentUnit=i; mode=p.mode||'full';
  quizItems=buildQuizItems(i,mode,p.itemIds);
  qIndex=Math.max(0,Math.min(p.qIndex||0,quizItems.length));
  roundCorrect=p.correct||0; locked=false; lastWrongKey=''; pendingQuestionHadWrong=!!p.questionHadWrong;
  renderShell();
  const box=$(`#quiz-${i}`); if(box)box.classList.remove('hidden');
  if(qIndex>=quizItems.length) finishRound(); else loadQuestion();
}
function initAudio(){try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();}catch(e){}}
function tone(f,d=0.12,type='sine',vol=.08){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function sfxOK(){initAudio();tone(620,.09);setTimeout(()=>tone(880,.14),90)}
function sfxNG(){initAudio();tone(220,.16,'sawtooth',.06)}
function renderShell(){renderTabs();const sections=$('#sections');sections.innerHTML='';UNITS.forEach((u,i)=>{const sec=document.createElement('section');sec.id='section-unit-'+i;sec.className='section '+(currentTab==='unit'&&currentUnit===i?'active':'');sections.appendChild(sec);renderUnitHome(i)});const rec=document.createElement('section');rec.id='section-record';rec.className='section '+(currentTab==='record'?'active':'');sections.appendChild(rec);renderGlobalRecord();const wrong=document.createElement('section');wrong.id='section-wrong';wrong.className='section '+(currentTab==='wrong'?'active':'');sections.appendChild(wrong);renderGlobalWrong();}
function renderTabs(){const tabs=$('#tabs');tabs.innerHTML='';UNITS.forEach((u,i)=>{const st=unitState(u.id);const b=document.createElement('button');b.className='tab '+(currentTab==='unit'&&currentUnit===i?'active ':'')+(st.passed?'pass ':'');b.textContent=u.tab;b.onclick=()=>showUnit(i);tabs.appendChild(b)});const rb=document.createElement('button');rb.className='tab '+(currentTab==='record'?'active':'');rb.textContent='기록';rb.onclick=showRecord;tabs.appendChild(rb);const wb=document.createElement('button');wb.className='tab warn '+(currentTab==='wrong'?'active':'');wb.textContent='오답 '+allWrongEntries().length;wb.onclick=showWrong;tabs.appendChild(wb)}
function showUnit(i){currentTab='unit';currentUnit=i;mode='full';qIndex=0;renderShell();}
function showRecord(){currentTab='record';renderShell();}
function showWrong(){currentTab='wrong';renderShell();}
function renderUnitHome(i){
  const u=UNITS[i],st=unitState(u.id),sec=$('#section-unit-'+i);const wrongCount=(st.wrongIds||[]).length;const p=st.progress;const inProgress=p&&p.active;
  const progressCard=inProgress?`<div class="card soft progress-save"><div class="record"><div><b>저장된 풀이</b><br><small>${progressText(p)}<br>마지막 저장: ${p.updatedAt||'-'}</small></div><strong>${Math.min(p.qIndex||0,p.total||0)}/${p.total||0}</strong></div><button class="btn orange" onclick="continueProgress(${i})">이어 풀기</button></div>`:'';
  sec.innerHTML=`<div class="card soft"><h2 class="unit-title">${u.title}</h2><div class="desc">${u.desc}</div><div class="top-tools"><span class="badge ${st.passed?'green':'gold'}">${st.passed?'통과 완료':'100점 통과 필요'}</span><span class="badge">이 Unit ${u.items.length}문장</span><span class="badge red">오답 ${wrongCount}개</span></div><div class="progress"><div class="bar" style="width:${st.passed?100:Math.min(st.bestScore||0,100)}%"></div></div></div>${progressCard}<div class="card"><div class="btn-row"><button class="btn" onclick="startRound(${i},'full')">전체 문제 처음부터 풀기</button><button class="btn orange" onclick="startRound(${i},'wrong')" ${wrongCount?'':'disabled'}>오답 다시 풀기 (${wrongCount})</button></div><div class="meta-line"><span class="badge">최고 ${st.bestScore||0}점</span><span class="badge">시도 ${st.attempts||0}회</span><span class="badge">최근 ${st.lastScore==null?'-':st.lastScore+'점'}</span></div></div><div id="quiz-${i}" class="hidden"></div>`
}
function startRound(i,m){
  currentTab='unit';currentUnit=i;mode=m;qIndex=0;roundCorrect=0;locked=false;questionHadWrong=false;pendingQuestionHadWrong=false;lastWrongKey='';
  quizItems=buildQuizItems(i,m);
  if(m==='wrong'&&!quizItems.length){alert('남은 오답이 없습니다.');return}
  saveProgress(0,0,{questionHadWrong:false,startedAt:nowStr(),updatedAt:nowStr()});
  renderShell();$(`#quiz-${i}`).classList.remove('hidden');loadQuestion()
}
function loadQuestion(){
  locked=false;questionHadWrong=!!pendingQuestionHadWrong;pendingQuestionHadWrong=false;lastWrongKey='';
  const i=currentUnit,q=quizItems[qIndex],box=$(`#quiz-${i}`),total=quizItems.length,answerTokens=tokens(q.item.en),shuffled=shuffle(answerTokens.map((t,idx)=>({t,idx})));
  saveProgress(qIndex,roundCorrect,{questionHadWrong});
  box.innerHTML=`<div class="card quiz-head"><div class="status"><span class="badge">${mode==='wrong'?'오답':'전체'} ${qIndex+1} / ${total}</span><span class="badge">${q.item.sec}</span><span class="badge green">정답 ${roundCorrect}</span></div><div class="qno">한글 해석</div><div class="ko">${q.item.ko}</div><div class="hint">단어를 위 답안 영역으로 옮기고 순서를 맞추세요. 모든 단어가 올라가면 자동으로 확인됩니다. 맞으면 OK가 뜨고 다음 문제 버튼이 나타납니다. 중간에 나가도 기록 탭에서 이어 풀 수 있습니다.</div></div><div id="answer" class="answer" aria-label="답안 영역"></div><div id="bank" class="bank" aria-label="단어 영역"></div><div id="feedback" class="feedback"></div>`;
  const bank=$('#bank');shuffled.forEach(obj=>{const chip=document.createElement('button');chip.type='button';chip.className='chip';chip.textContent=obj.t;chip.dataset.idx=obj.idx;chip.onclick=()=>moveChip(chip);bank.appendChild(chip)});setupSortable();setTimeout(()=>box.scrollIntoView({behavior:'smooth',block:'start'}),50)
}
function setupSortable(){if(!window.Sortable)return;if(window._grammarSortAnswer){try{window._grammarSortAnswer.destroy();window._grammarSortBank.destroy()}catch(e){}}const opts={group:'grammarWords',animation:160,ghostClass:'sortable-ghost',dragClass:'sortable-drag',fallbackOnBody:true,swapThreshold:.65,onEnd:()=>setTimeout(autoCheckIfReady,60)};window._grammarSortAnswer=Sortable.create($('#answer'),opts);window._grammarSortBank=Sortable.create($('#bank'),opts)}
function showOkFlash(){const old=$('.ok-pop');if(old)old.remove();const el=document.createElement('div');el.className='ok-pop';el.textContent='OK';document.body.appendChild(el);setTimeout(()=>el.remove(),900)}
function moveChip(chip){if(locked)return;initAudio();const ans=$('#answer'),bank=$('#bank');if(chip.parentElement===bank)ans.appendChild(chip);else bank.appendChild(chip);setTimeout(autoCheckIfReady,50)}
function autoCheckIfReady(){if(locked)return;const bank=$('#bank');if(!bank||bank.children.length!==0)return;checkAutoAnswer()}
function checkAutoAnswer(){
  if(locked)return;const q=quizItems[qIndex],ansTokens=$all('#answer .chip').map(c=>c.textContent),expectedTokens=tokens(q.item.en);if(ansTokens.length!==expectedTokens.length)return;const fb=$('#feedback'),key=norm(ansTokens.join(' '));const ok=key===norm(q.item.en);
  if(ok){locked=true;if(!questionHadWrong)roundCorrect++;if(mode==='wrong')removeWrong(q.id);showOkFlash();sfxOK();$('#answer').style.background='#e8fff4';$('#answer').style.borderColor='var(--green)';saveProgress(qIndex+1,roundCorrect,{questionHadWrong:false});const nextLabel=(qIndex+1<quizItems.length)?'다음 문제':'결과 보기';fb.className='feedback ok show';fb.innerHTML=`<div class="next-panel"><div class="ok-small">OK</div><button class="btn" onclick="nextQuestion()">${nextLabel}</button></div>`}
  else{questionHadWrong=true;if(mode==='full')addWrong(q.id);sfxNG();saveProgress(qIndex,roundCorrect,{questionHadWrong:true});$('#answer').style.background='#fff0f0';$('#answer').style.borderColor='var(--red)';if(lastWrongKey!==key){fb.className='feedback ng show';fb.innerHTML='<div class="try-msg">순서가 아직 맞지 않습니다. 위 답안 영역에서 단어를 드래그해 다시 맞춰 보세요.</div>';lastWrongKey=key}setTimeout(()=>{if(!locked){$('#answer').style.background='#eef7ff';$('#answer').style.borderColor='var(--main)'}},550)}
}
function addWrong(id){const u=UNITS[currentUnit],st=unitState(u.id),arr=st.wrongIds||[];if(!arr.includes(id))arr.push(id);saveUnitState(u.id,{wrongIds:arr});renderTabs()}
function removeWrong(id){const u=UNITS[currentUnit],st=unitState(u.id),arr=(st.wrongIds||[]).filter(x=>x!==id);saveUnitState(u.id,{wrongIds:arr});renderTabs()}
function nextQuestion(){qIndex++;if(qIndex<quizItems.length){saveProgress(qIndex,roundCorrect,{questionHadWrong:false});loadQuestion()}else finishRound()}
function finishRound(){
  const i=currentUnit,u=UNITS[i],st=unitState(u.id),total=quizItems.length,score=Math.round(roundCorrect/total*100);const history=[{time:nowStr(),mode,correct:roundCorrect,total,score},...(st.history||[])].slice(0,30);let passed=st.passed;if(mode==='full'&&score===100)passed=true;const best=mode==='full'?Math.max(st.bestScore||0,score):(st.bestScore||0);saveUnitState(u.id,{attempts:(st.attempts||0)+1,lastScore:score,bestScore:best,history,passed,progress:null});const left=(unitState(u.id).wrongIds||[]).length;const box=$(`#quiz-${i}`),emoji=score===100?'🏆':'📝';box.innerHTML=`<div class="card complete show"><div class="big-emoji">${emoji}</div><h2 class="unit-title">${score===100?'완료!':'다시 연습해요'}</h2><div class="score-big">${roundCorrect}/${total}</div><div class="desc">${passed?'통과 처리되었습니다.':'전체 문제 100점이 되어야 통과됩니다.'}<br>남은 오답: ${left}개</div><div class="btn-row"><button class="btn" onclick="startRound(${i},'full')">전체 다시 풀기</button><button class="btn orange" onclick="startRound(${i},'wrong')" ${left?'':'disabled'}>오답 다시 풀기</button></div><button class="btn secondary" onclick="showRecord()">기록 보기</button></div>`;renderTabs()
}
function renderGlobalRecord(){
  const sec=$('#section-record');let totalPassed=0,totalAttempts=0;
  let html=`<div class="card soft"><h2 class="unit-title">📘 학습 기록</h2><div class="desc">풀다가 나가도 현재 점수와 위치가 자동 저장됩니다. 저장된 풀이가 있으면 기록 탭에서 바로 이어 풀 수 있습니다.</div></div><div class="unit-list">`;
  UNITS.forEach((u,ui)=>{
    const st=unitState(u.id);if(st.passed)totalPassed++;totalAttempts+=st.attempts||0;
    const p=st.progress;const progressBlock=(p&&p.active)?`<div class="record in-progress"><div><b>진행 중</b><br><small>${progressText(p)}<br>마지막 저장: ${p.updatedAt||'-'}</small></div><strong>${Math.min(p.qIndex||0,p.total||0)}/${p.total||0}</strong></div><button class="btn orange" onclick="continueProgress(${ui})">저장된 위치부터 이어 풀기</button>`:'';
    const hist=(st.history||[]).slice(0,4).map(h=>`<div class="record"><div><b>${h.mode==='wrong'?'오답 풀이':'전체 풀이'}</b><br><small>${h.time}</small></div><strong>${h.correct}/${h.total}</strong></div>`).join('')||'<div class="empty">아직 완료 기록이 없습니다.</div>';
    html+=`<div class="card"><h3 class="unit-title">${u.tab} <span class="badge ${st.passed?'green':'gold'}">${st.passed?'PASS':'미통과'}</span></h3><div class="record-grid"><div class="record"><div><b>문장 수</b><br><small>${u.title}</small></div><strong>${u.items.length}</strong></div><div class="record"><div><b>최고 점수</b><br><small>전체 문제 기준</small></div><strong>${st.bestScore||0}점</strong></div><div class="record"><div><b>최근 점수</b><br><small>마지막 완료 풀이</small></div><strong>${st.lastScore==null?'-':st.lastScore+'점'}</strong></div><div class="record"><div><b>남은 오답</b><br><small>오답 탭에서 다시 풀기</small></div><strong>${(st.wrongIds||[]).length}개</strong></div>${progressBlock}${hist}</div><div class="btn-row"><button class="btn" onclick="showUnit(${ui});startRound(${ui},'full')">${u.tab} 처음부터 풀기</button><button class="btn orange" onclick="showUnit(${ui});startRound(${ui},'wrong')" ${(st.wrongIds||[]).length?'':'disabled'}>오답 풀기</button></div></div>`;
  });
  html+=`</div><div class="card soft"><div class="record"><div><b>전체 통과</b><br><small>총 ${totalItems()}문장 · 총 시도 ${totalAttempts}회</small></div><strong>${totalPassed}/${UNITS.length}</strong></div><button class="btn danger" onclick="clearAllRecords()">전체 기록 초기화</button></div>`;sec.innerHTML=html
}
function renderGlobalWrong(){const sec=$('#section-wrong'),entries=allWrongEntries();let html=`<div class="card soft"><h2 class="unit-title">📝 오답 다시 풀기</h2><div class="desc">틀린 문제는 여기에 남습니다. 오답 풀이에서 맞히면 목록에서 삭제됩니다. Unit 통과는 전체 문제를 100점 맞아야 처리됩니다.</div></div>`;if(!entries.length){html+='<div class="empty">남은 오답이 없습니다.</div>';sec.innerHTML=html;return}const grouped={};entries.forEach(e=>{(grouped[e.ui]||(grouped[e.ui]=[])).push(e)});Object.keys(grouped).forEach(key=>{const ui=Number(key),u=UNITS[ui];grouped[key].sort((a,b)=>itemIndexFromId(a.id)-itemIndexFromId(b.id));html+=`<div class="card"><div class="status"><h3 class="unit-title" style="margin:0">${u.tab}</h3><span class="badge red">${grouped[key].length}개</span></div><div class="wrong-list">${grouped[key].map(e=>`<div class="wrong-item"><div class="unit">${e.item.sec}</div><div>${e.item.ko}</div><div class="en">${e.item.en}</div></div>`).join('')}</div><button class="btn orange" onclick="showUnit(${ui});startRound(${ui},'wrong')">${u.tab} 오답 풀기</button></div>`});sec.innerHTML=html}
function clearAllRecords(){if(!confirm('전체 기록과 오답을 초기화할까요?'))return;localStorage.removeItem(STORE);renderShell()}
renderShell();
</script>
</body>
</html>
